# Application under test
base.url=https://www.saucedemo.com

# Browser: chrome | firefox | edge
browser=chrome

# Run headless (true for CI, false for local dev)
headless=false

# Timeouts (seconds)
implicit.wait=10
explicit.wait=20
page.load.timeout=30

# Reports
screenshot.on.failure=true
extent.report.path=reports/ExtentReport.html

# Test environment label shown in the report
environment=staging
